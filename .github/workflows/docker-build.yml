name: Build and Push Image to DockerHub

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Docker Hub
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v4 is compatible with Node 24

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6 # Bumped to v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }} # Only push on actual merges/pushes
          tags: ${{ secrets.DOCKER_USERNAME }}/taylabs-mail:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
